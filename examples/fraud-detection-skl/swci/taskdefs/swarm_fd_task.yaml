Name: swarm_fd_task
TaskType: RUN_SWARM
Author: HPESwarm
Prereq: user_env_skl_build_task
Outcome: swarm_fd_task
Body:
    # Default: SGD-based model. To use the custom OnlineLogisticRegression model,
    # change the Command below to: model/fraud-detection-custom.py
    Command: model/fraud-detection-SGD.py
    Entrypoint: python3
    WorkingDir: /tmp/test
    Envvars: ["DATA_DIR": app-data, "MAX_EPOCHS": 16, "MIN_PEERS": 4, "SYNC_FREQUENCY": 128]
    PrivateContent: /tmp/test/
    SharedContent:
    -   Src: <PROJECT-MODEL>
        Tgt: /tmp/test/model
        MType: BIND
